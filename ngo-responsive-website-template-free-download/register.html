<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="register.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-body">
        <h2 class="text-uppercase text-center">Register</h2>
        <div class="mb-3">
          <label for="formGroupExampleInput" class="form-label">Name</label>
          <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Your Name">
        </div>  
        <div class="mb-3">
          <label for="formGroupExampleInput" class="form-label">Email</label>
          <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Your Email">
        </div> 
        <div class="mb-3">
          <label for="formGroupExampleInput" class="form-label">Password</label>
          <input type="password" class="form-control" id="formGroupExampleInput" placeholder="Your Password">
        </div> 
        <div class="mb-3">
          <label for="formGroupExampleInput" class="form-label">Repeat Password</label>
          <input type="password" class="form-control" id="formGroupExampleInput" placeholder="Repeat Password">
        </div>
        <div class="mb-3">
          <label for="formGroupExampleInput" class="form-label">Phone Number</label>
          <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Phone Number">
        </div>
        <div class="mb-3">
          <label for="formGroupExampleInput" class="form-label">Your Birthday</label>
          <input type="datetime-local" class="form-control" id="formGroupExampleInput">
        </div>
        <div class="button"><button type="submit">Register</button></div>
      </div>      
    </div>
  </div>
</body>
</html>
